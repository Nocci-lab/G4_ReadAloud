<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>G4 Read Aloud</title>
  <style>
    body {
      font-family: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic", sans-serif;
      max-width: 900px;
      margin: 40px auto;
      font-size: 18pt;
      line-height: 1.8;
      background: #fafafa;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14pt;
      margin-bottom: 36px;
      color: #555;
    }

    .item {
      background: white;
      border: 2px solid #ccc;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 24px;
    }

    .title {
      font-size: 18pt;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 14pt;
      color: #555;
      margin-bottom: 16px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      display: inline-block;
      padding: 12px 22px;
      background: #4caf50;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 14pt;
    }

    a:hover {
      background: #43a047;
    }
  </style>
</head>
<body>

<h1>📖 G4 Read Aloud</h1>
<div class="subtitle">
  英検4級レベル｜音読・リスニング練習
</div>

  </div>
</div>
